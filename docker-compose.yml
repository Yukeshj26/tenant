version: "3.9"

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tenantsense_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tenantsense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tenantsense_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-tenantsense_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployment/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tenantsense}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MongoDB ─────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: tenantsense_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-tenantsense}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-tenantsense_mongo_pass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-tenantsense_logs}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: tenantsense_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenantsense_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./machine_learning:/ml
      - ./datasets:/datasets
      - ./chatbot:/chatbot
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── ML Worker (Celery) ──────────────────────────────────────────────────
  ml_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tenantsense_ml_worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
      - ./machine_learning:/ml
      - ./datasets:/datasets
    depends_on:
      - redis
      - postgres
    command: celery -A app.services.celery_worker worker --loglevel=info

  # ─── Next.js Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tenantsense_frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_WS_URL: ws://backend:8000

volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  default:
    name: tenantsense_network
